# Minimal dnscrypt-proxy config for the sidecar.
#
# Listens on 127.0.0.1:53 (UDP + TCP) inside the sidecar's netns.
# Upstream resolvers are DNSCrypt-capable public servers.
# Outbound DNS queries leave the netns as TCP, which iptables REDIRECTs to
# redsocks -> user-supplied proxy. Thus DNS cannot leak.

listen_addresses = ['127.0.0.1:53']

server_names = ['cloudflare', 'google']

require_dnssec = true
require_nolog = true
require_nofilter = false

# Force TCP upstream so traffic is REDIRECTable by iptables.
# (UDP to anywhere except 127.0.0.1:53 is DROP'd by our OUTPUT policy.)
force_tcp = true

cache = true
cache_size = 4096
cache_min_ttl = 600
cache_max_ttl = 86400

[sources.public-resolvers]
urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md']
cache_file = '/var/cache/dnscrypt-proxy/public-resolvers.md'
minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
refresh_delay = 72
